# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:spdx
      - run: pnpm typecheck
      - run: pnpm test

  isolation:
    # Tests d'isolation inter-tenant (RLS) — gate bloquant (ADR 0002)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: humanix }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:isolation

  a11y:
    # Gate accessibilité bloquant (ADR 0004) : axe 0 critique/sérieux + Lighthouse a11y >= 95.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # 1) Gate axe-core sur les écrans + design system (bloquant).
      - run: pnpm test:a11y
      # 2) Build du front pour les vérifs navigateur.
      - run: pnpm --filter @humanix/web build
      # 3) Lighthouse a11y >= 95 sur le build statique (bloquant via lighthouserc.json).
      - run: npx --yes @lhci/cli@0.14.x autorun --config=apps/web/lighthouserc.json
      # 4) pa11y-ci (WCAG2AA) sur les écrans servis.
      - name: pa11y-ci
        run: |
          pnpm --filter @humanix/web preview --port 4173 &
          npx --yes wait-on http://localhost:4173/login
          npx --yes pa11y-ci --config apps/web/.pa11yci

  security:
    # Audit deps, secret scanning, SBOM, en-têtes SPDX — gate sécurité (§12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:spdx
      - run: pnpm audit --audit-level=high
      # Secret scanning (commits + arbre de travail).
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SBOM CycloneDX (artefact de conformité).
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: sbom.cyclonedx.json }
      # TODO : SAST (semgrep/CodeQL) + scan d'image conteneur (trivy) au packaging.
      # TODO étape 11 : SAST (semgrep/codeql), gitleaks, syft SBOM, trivy image, vérif en-têtes SPDX

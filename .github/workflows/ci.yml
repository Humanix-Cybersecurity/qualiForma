# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:spdx
      - run: pnpm typecheck
      - run: pnpm test

  isolation:
    # Tests d'isolation inter-tenant (RLS) — gate bloquant (ADR 0002)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: humanix }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:isolation

  a11y:
    # Gate accessibilité bloquant (ADR 0004) : axe 0 critique/sérieux + Lighthouse a11y >= 95.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # 1) Gate axe-core sur les écrans + design system (bloquant).
      - run: pnpm test:a11y
      # 2) Build du front pour les vérifs navigateur.
      - run: pnpm --filter @humanix/web build
      # 3) Lighthouse a11y >= 95 sur le build statique (bloquant via lighthouserc.json).
      - run: npx --yes @lhci/cli@0.14.x autorun --config=apps/web/lighthouserc.json
      # 4) pa11y-ci (WCAG2AA) sur les écrans servis.
      - name: pa11y-ci
        run: |
          pnpm --filter @humanix/web preview --port 4173 &
          npx --yes wait-on http://localhost:4173/login
          npx --yes pa11y-ci --config apps/web/.pa11yci

  security:
    # Audit deps, secret scanning, SBOM, en-têtes SPDX — gate sécurité (§12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:spdx
      - run: pnpm audit --audit-level=high
      # Secret scanning (commits + arbre de travail).
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SBOM CycloneDX (artefact de conformité).
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: sbom.cyclonedx.json }
      # SAST Semgrep (LGPL-2.1) — règles OWASP / sécurité, gate bloquant.
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/typescript
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: semgrep.sarif }
        continue-on-error: true
      # Scan vulnérabilités + mauvaises configurations du dépôt (Trivy, Apache-2.0).
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  image-scan:
    # Scan de l'image conteneur livrée (Trivy) — gate bloquant au packaging (§12).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image API
        run: docker build -t humanix-api:ci --target api-runtime -f infra/docker/Dockerfile .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: humanix-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

# Stack de développement local : PostgreSQL, Redis, MinIO, ClamAV.
# L'API et le front tournent en local (pnpm dev) et pointent vers ces services.

services:
  postgres:
    image: postgres:16
    environment:
      # Utilisateur principal = propriétaire des tables + rôle de migration (superuser).
      # Le rôle applicatif `app` (NON superuser, NON BYPASSRLS) est créé par initdb.
      POSTGRES_USER: humanix_admin
      POSTGRES_PASSWORD: humanix_admin
      POSTGRES_DB: humanix
    ports: ["5432:5432"]
    volumes:
      - "pg_data:/var/lib/postgresql/data"
      # Scripts d'init exécutés une seule fois à la création du volume (crée le rôle `app`).
      - "./initdb:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humanix_admin -d humanix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  clamav:
    image: clamav/clamav:latest
    ports: ["3310:3310"]
    volumes: ["clamav_db:/var/lib/clamav"]
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pg_data:
  minio_data:
  clamav_db:
